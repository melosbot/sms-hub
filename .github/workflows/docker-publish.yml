# 构建 Docker 镜像并发布到 GitHub Container Registry (ghcr.io)。
# 触发:push 到 main/dev 分支、打 v* tag、或手动 workflow_dispatch。
# 镜像:ghcr.io/<owner>/<repo>,多架构(linux/amd64 + linux/arm64,homelab 树莓派/NUC 友好)。
#
# 用法:
#   - push main → 构建 :latest + :main + :sha
#   - push dev → 构建 :dev + :sha
#   - git tag v1.2.3 && push → 额外打 :1.2.3 / :1.2 / :1
#   - 首次发布后,到 GitHub → Packages → 该 package → settings 把可见性设为 public(否则拉取需登录)
#   - 拉取:docker pull ghcr.io/<owner>/<repo>:latest
#
# 无需额外 secret:`GITHUB_TOKEN` 自动具备 packages:write 权限。

name: Build and publish Docker image

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:        # 手动触发(可在 Actions 页指定分支)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # <owner>/<repo>;metadata-action 会转小写

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read       # 读取源码
      packages: write      # 推送镜像到 ghcr
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU(多架构)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像 tag / label
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # main → :latest;v1.2.3 → :1.2.3/:1.2/:1;每次 → :sha;分支名 → :<branch>
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=ref,event=branch

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: core/Dockerfile          # 主 Dockerfile:三阶段(前端 npm build + Python 依赖 + 运行时),自包含
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha           # GitHub Actions cache,加速后续构建
          cache-to: type=gha,mode=max
